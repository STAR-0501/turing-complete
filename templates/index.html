<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逻辑电路设计与模拟</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/css/styles.css') }}">
</head>
<body>
    <div id="app">
        <div class="grid" id="grid"></div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <button id="btn-select" class="active">选择</button>
            <button id="btn-input-toggle">输入切换</button>
            <button id="btn-and">与门</button>
            <button id="btn-or">或门</button>
            <button id="btn-not">非门</button>
            <button id="btn-input">输入</button>
            <button id="btn-output">输出</button>
            <button id="btn-delete">删除</button>
            <button id="btn-clear">清空</button>
            <button id="btn-grid">网格</button>
            <button id="btn-undo">撤销</button>
            <button id="btn-redo">重做</button>
        </div>
        <div class="status-bar" id="status-bar">就绪</div>
    </div>
    <script type="module" src="{{ url_for('static', filename='scripts/app.js') }}"></script>
</body>
</html>
