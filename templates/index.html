<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布尔之巅———逻辑电路模拟系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/css/styles.css') }}">
</head>
<body>
    <div id="app">
        <div class="grid" id="grid"></div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <button id="btn-select" class="active"><span>选择</span><span>1</span></button>
            <button id="btn-input-toggle"><span>输入切换</span><span>2</span></button>
            <button id="btn-and"><span>与门</span><span>3</span></button>
            <button id="btn-or"><span>或门</span><span>4</span></button>
            <button id="btn-not"><span>非门</span><span>5</span></button>
            <button id="btn-input"><span>输入</span><span>6</span></button>
            <button id="btn-output"><span>输出</span><span>7</span></button>
            <button id="btn-delete"><span>删除</span><span>8</span></button>
            <button id="btn-clear"><span>清空</span><span>9</span></button>
            <button id="btn-grid"><span>网格</span><span>0</span></button>
            <button id="btn-undo"><span>撤销</span><span>Ctrl+Z</span></button>
            <button id="btn-redo"><span>重做</span><span>Ctrl+Y</span></button>
            <button id="btn-wire-anim" class="active"><span>✨动画</span></button>
            <button id="btn-export-arduino" style="background:rgba(0,200,100,0.25);border-color:rgba(0,200,100,0.5)"><span>Arduino</span><span>导出</span></button>
        </div>
        <div class="status-bar" id="status-bar">就绪</div>

        <!-- Agent 侧边栏切换按钮 -->
        <div id="agent-toggle" class="agent-toggle" title="打开 Agent">◀</div>

        <!-- Agent 侧边栏 -->
        <div id="agent-sidebar" class="agent-sidebar">
            <div class="agent-sidebar-resize-handle" id="agent-resize-handle"></div>
            <div class="agent-header">
                <div class="agent-header-left">
                    <div class="agent-header-icon">◆</div>
                    <h3>Agent</h3>
                </div>
                <div class="agent-header-center">
                    <select id="conversation-select" class="conversation-select">
                        <option value="">当前对话</option>
                    </select>
                </div>
                <div class="agent-header-actions">
                    <button id="btn-change-apikey" class="agent-header-btn" title="更换 API Key" style="display:none">🔑</button>
                    <button id="agent-minimize" class="agent-header-btn" title="最小化">▶</button>
                </div>
            </div>
            <div id="agent-messages" class="agent-messages">
                <div class="agent-message ai">你好！我是 Agent，可以帮你构建电路。例如："帮我放一个与门"或"连接这两个元件"。</div>
                <!-- AI 配置表单 -->
                <div id="ai-config-form" class="ai-config-form" style="display:none">
                    <div class="ai-config-header">AI 配置</div>
                    <div class="ai-config-field">
                        <label>API 请求地址</label>
                        <input type="text" id="cfg-base-url" placeholder="https://api.deepseek.com">
                    </div>
                    <div class="ai-config-field">
                        <label>API Key</label>
                        <div class="ai-config-password-wrap">
                            <input type="password" id="cfg-api-key" placeholder="sk-...">
                            <button class="ai-config-pwd-toggle" id="cfg-pwd-toggle" title="显示/隐藏">👁</button>
                        </div>
                    </div>
                    <div class="ai-config-field">
                        <label>模型 ID</label>
                        <input type="text" id="cfg-model" placeholder="deepseek-v4-flash">
                    </div>
                    <details class="ai-config-advanced">
                        <summary>高级设置</summary>
                        <div class="ai-config-field">
                            <label>单次输出最大 Token 数</label>
                            <input type="number" id="cfg-max-tokens" value="4000" min="1" max="32000">
                        </div>
                        <div class="ai-config-field">
                            <label>连接超时（秒）</label>
                            <input type="number" id="cfg-connect-timeout" value="10" min="1" max="120">
                        </div>
                        <div class="ai-config-field">
                            <label>读取超时（秒）</label>
                            <input type="number" id="cfg-read-timeout" value="180" min="1" max="600">
                        </div>
                    </details>
                    <div class="ai-config-actions">
                        <button class="ai-config-test-btn" id="cfg-test-btn">测试连接</button>
                        <button class="ai-config-save-btn" id="cfg-save-btn">保存配置</button>
                        <span class="ai-config-status" id="cfg-status"></span>
                    </div>
                </div>
            </div>
            <div class="agent-prompt-suggestions" id="agent-prompt-suggestions">
                <button class="agent-suggestion-btn" data-prompt="请为电路中的所有元件添加注释，说明每个元件的功能和作用">AI注释</button>
                <button class="agent-suggestion-btn" data-prompt="请整理当前电路的布局，让电路更加清晰美观">AI整理</button>
            </div>
            <div class="agent-input-area">
                <textarea id="agent-input" placeholder="输入指令..." rows="1"></textarea>
                <div class="agent-input-footer">
                    <button id="agent-think" class="agent-think-btn" title="开启深度思考模式">深度思考</button>
                    <button id="agent-send" class="agent-send-btn">发送</button>
                </div>
            </div>
        </div>

        <!-- 模块面板 -->
        <div id="module-panel" class="module-panel">
            <div class="module-panel-header">
                <h3>保存的模块</h3>
            </div>
            <div id="module-list" class="module-list">
                <!-- 模块列表会在这里动态添加 -->
            </div>
        </div>

        <!-- 命名弹窗 -->
        <div id="name-modal" class="modal">
            <div class="modal-content">
                <h3>保存模块</h3>
                <input type="text" id="function-name-input" placeholder="请输入模块名称" autocomplete="off">
                <div class="modal-buttons">
                    <button id="cancel-save-module" class="btn-cancel">取消</button>
                    <button id="confirm-save-module" class="btn-confirm">保存</button>
                </div>
            </div>
        </div>

        <!-- 注释弹窗 -->
        <div id="comment-modal" class="modal">
            <div class="modal-content">
                <h3>编辑注释</h3>
                <textarea id="comment-input" placeholder="请输入注释（支持多行）" rows="4"></textarea>
                <div class="modal-buttons">
                    <button id="cancel-comment" class="btn-cancel">取消</button>
                    <button id="confirm-comment" class="btn-confirm">确定</button>
                </div>
            </div>
        </div>

        <!-- Arduino 导出弹窗 -->
        <div id="arduino-modal" class="modal">
            <div class="modal-content" style="max-width:700px;width:90%">
                <h3>Arduino 导出</h3>
                <div id="arduino-status" style="margin-bottom:8px;font-size:13px;color:#888"></div>
                <!-- 端口选择区 -->
                <div id="arduino-port-area" style="margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px">
                    <span style="color:#ccc">端口:</span>
                    <select id="arduino-port-select" style="flex:1;padding:4px 8px;border-radius:4px;border:1px solid #555;background:#2a2a2a;color:#ddd;font-size:13px">
                        <option value="">-- 自动检测 --</option>
                    </select>
                    <button id="btn-arduino-refresh" style="padding:4px 12px;border-radius:4px;border:1px solid #555;background:#3a3a3a;color:#ddd;cursor:pointer">刷新</button>
                    <button id="btn-arduino-upload" style="padding:4px 16px;border-radius:4px;border:1px solid #0a8;background:#0a8;color:#fff;cursor:pointer;font-weight:bold">编译并上传</button>
                </div>
                <pre id="arduino-code" style="background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:6px;overflow:auto;max-height:360px;font-size:12px;white-space:pre-wrap;word-break:break-all"></pre>
                <div class="modal-buttons" style="margin-top:10px">
                    <button id="btn-arduino-close" class="btn-cancel">关闭</button>
                    <button id="btn-arduino-copy" class="btn-cancel" style="background:#555;color:#fff">复制代码</button>
                    <button id="btn-arduino-download" class="btn-cancel" style="background:#4a9;color:#fff">下载 .ino</button>
                </div>
            </div>
        </div>

    </div>
    <script type="module" src="{{ url_for('static', filename='scripts/app.js') }}?v=2"></script>
    <script type="module" src="{{ url_for('static', filename='scripts/chat.js') }}?v=2"></script>
</body>
</html>
