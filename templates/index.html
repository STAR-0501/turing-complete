<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布尔之巅———逻辑电路模拟系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/css/styles.css') }}">
</head>
<body>
    <div id="app">
        <div class="grid" id="grid"></div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <button id="btn-select" class="active"><span>选择</span><span>1</span></button>
            <button id="btn-input-toggle"><span>输入切换</span><span>2</span></button>
            <button id="btn-and"><span>与门</span><span>3</span></button>
            <button id="btn-or"><span>或门</span><span>4</span></button>
            <button id="btn-not"><span>非门</span><span>5</span></button>
            <button id="btn-input"><span>输入</span><span>6</span></button>
            <button id="btn-output"><span>输出</span><span>7</span></button>
            <button id="btn-delete"><span>删除</span><span>8</span></button>
            <button id="btn-clear"><span>清空</span><span>9</span></button>
            <button id="btn-grid"><span>网格</span><span>0</span></button>
            <button id="btn-undo"><span>撤销</span><span>Ctrl+Z</span></button>
            <button id="btn-redo"><span>重做</span><span>Ctrl+Y</span></button>
            <button id="btn-ai-comment"><span>AI注释</span><span>C</span></button>
            <button id="btn-ai-layout"><span>AI整理</span><span>L</span></button>
        </div>
        <div class="status-bar" id="status-bar">就绪</div>

        <!-- AI 聊天窗口 -->
        <div id="chat-container" class="chat-container">
            <div class="chat-header">
                <h3>AI 助手</h3>
                <button id="toggle-chat">_</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="message ai">你好！我是电路助手。你可以让我帮你构建电路，例如：“帮我放一个与门”或“连接这两个元件”。</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="输入指令..." autocomplete="off">
                <button id="send-chat">发送</button>
            </div>
        </div>

        <!-- 函数面板 -->
        <div id="function-panel" class="function-panel">
            <div class="function-panel-header">
                <h3>保存的函数</h3>
            </div>
            <div id="function-list" class="function-list">
                <!-- 函数列表会在这里动态添加 -->
            </div>
        </div>

        <!-- 命名弹窗 -->
        <div id="name-modal" class="modal">
            <div class="modal-content">
                <h3>保存函数</h3>
                <input type="text" id="function-name-input" placeholder="请输入函数名称" autocomplete="off">
                <div class="modal-buttons">
                    <button id="cancel-save-function" class="btn-cancel">取消</button>
                    <button id="confirm-save-function" class="btn-confirm">保存</button>
                </div>
            </div>
        </div>

        <!-- 注释弹窗 -->
        <div id="comment-modal" class="modal">
            <div class="modal-content">
                <h3>编辑注释</h3>
                <textarea id="comment-input" placeholder="请输入注释（支持多行）" rows="4"></textarea>
                <div class="modal-buttons">
                    <button id="cancel-comment" class="btn-cancel">取消</button>
                    <button id="confirm-comment" class="btn-confirm">确定</button>
                </div>
            </div>
        </div>

        <!-- AI 加载遮罩 -->
        <div id="ai-loading" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <div class="loading-text">AI 正在处理中...</div>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='scripts/app.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='scripts/chat.js') }}"></script>
</body>
</html>
