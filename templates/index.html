<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布尔之巅———逻辑电路模拟系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/css/styles.css') }}">
</head>
<body>
    <div id="app">
        <div class="grid" id="grid"></div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <button id="btn-select" class="active"><span>选择</span><span>1</span></button>
            <button id="btn-input-toggle"><span>输入切换</span><span>2</span></button>
            <button id="btn-and"><span>与门</span><span>3</span></button>
            <button id="btn-or"><span>或门</span><span>4</span></button>
            <button id="btn-not"><span>非门</span><span>5</span></button>
            <button id="btn-input"><span>输入</span><span>6</span></button>
            <button id="btn-output"><span>输出</span><span>7</span></button>
            <button id="btn-delete"><span>删除</span><span>8</span></button>
            <button id="btn-clear"><span>清空</span><span>9</span></button>
            <button id="btn-grid"><span>网格</span><span>0</span></button>
            <button id="btn-undo"><span>撤销</span><span>Ctrl+Z</span></button>
            <button id="btn-redo"><span>重做</span><span>Ctrl+Y</span></button>
        </div>
        <div class="status-bar" id="status-bar">就绪</div>
    </div>
    <script type="module" src="{{ url_for('static', filename='scripts/app.js') }}"></script>
</body>
</html>
