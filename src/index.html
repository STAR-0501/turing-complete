<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逻辑电路设计与模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #00ffff;
            overflow: hidden;
            height: 100vh;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        .toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        
        .toolbar button {
            background-color: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #00ffff;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar button:hover {
            background-color: rgba(0, 255, 255, 0.4);
        }
        
        .toolbar button.active {
            background-color: rgba(0, 255, 255, 0.6);
        }
        
        .element {
            position: absolute;
            cursor: move;
            background-color: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        
        .input-block {
            width: 60px;
            height: 60px;
        }
        
        .output-block {
            width: 60px;
            height: 60px;
        }
        
        .gate {
            width: 80px;
            height: 60px;
        }
        
        .port {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #00ffff;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .port:hover {
            box-shadow: 0 0 10px #00ffff;
        }
        
        .port.selected {
            box-shadow: 0 0 15px #00ffff, 0 0 20px #00ffff;
        }
        
        .wire {
            stroke: #00ffff;
            stroke-width: 2;
            fill: none;
        }
        
        .wire.selected {
            stroke: #ff00ff;
            stroke-width: 3;
        }
        
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            padding: 5px 10px;
            backdrop-filter: blur(10px);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="grid" id="grid"></div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <button id="btn-and">与门</button>
            <button id="btn-or">或门</button>
            <button id="btn-not">非门</button>
            <button id="btn-input">输入</button>
            <button id="btn-output">输出</button>
            <button id="btn-delete">删除</button>
            <button id="btn-grid">网格</button>
            <button id="btn-undo">撤销</button>
            <button id="btn-redo">重做</button>
        </div>
        <div class="status-bar" id="status-bar">就绪</div>
    </div>
    <script>
        // 全局变量
        let canvas, ctx;
        let elements = [];
        let wires = [];
        let selectedElement = null;
        let selectedWire = null;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let isDrawingWire = false;
        let wireStart = null;
        let gridEnabled = true;
        let history = [];
        let historyIndex = -1;
        let currentTool = 'select'; // select, input-toggle, delete
        
        // 初始化
        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            
            // 事件监听
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            window.addEventListener('resize', resizeCanvas);
            
            // 工具栏按钮事件
            document.getElementById('btn-and').addEventListener('click', () => addElement('AND'));
            document.getElementById('btn-or').addEventListener('click', () => addElement('OR'));
            document.getElementById('btn-not').addEventListener('click', () => addElement('NOT'));
            document.getElementById('btn-input').addEventListener('click', () => addElement('INPUT'));
            document.getElementById('btn-output').addEventListener('click', () => addElement('OUTPUT'));
            document.getElementById('btn-delete').addEventListener('click', () => {
                currentTool = 'delete';
                document.getElementById('status-bar').textContent = '删除工具已激活';
                // 重置所有按钮状态
                document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
                document.getElementById('btn-delete').classList.add('active');
            });
            document.getElementById('btn-grid').addEventListener('click', toggleGrid);
            document.getElementById('btn-undo').addEventListener('click', undo);
            document.getElementById('btn-redo').addEventListener('click', redo);
            
            // 添加选择工具按钮
            const selectButton = document.createElement('button');
            selectButton.id = 'btn-select';
            selectButton.textContent = '选择';
            selectButton.classList.add('active');
            selectButton.addEventListener('click', () => {
                currentTool = 'select';
                document.getElementById('status-bar').textContent = '选择工具已激活';
                // 重置所有按钮状态
                document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
                selectButton.classList.add('active');
            });
            document.querySelector('.toolbar').insertBefore(selectButton, document.getElementById('btn-and'));
            
            // 添加输入切换工具按钮
            const inputToggleButton = document.createElement('button');
            inputToggleButton.id = 'btn-input-toggle';
            inputToggleButton.textContent = '输入切换';
            inputToggleButton.addEventListener('click', () => {
                currentTool = 'input-toggle';
                document.getElementById('status-bar').textContent = '输入切换工具已激活';
                // 重置所有按钮状态
                document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
                inputToggleButton.classList.add('active');
            });
            document.querySelector('.toolbar').insertBefore(inputToggleButton, document.getElementById('btn-and'));
            
            // 保存初始状态
            saveState();
            
            // 开始渲染循环
            render();
        }
        
        // 调整画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }
        
        // 添加元件
        function addElement(type) {
            const x = 100;
            const y = 100;
            let element;
            
            switch (type) {
                case 'AND':
                    element = {
                        id: generateId(),
                        type: 'AND',
                        x, y,
                        width: 80,
                        height: 60,
                        inputs: [
                            { id: generateId(), x: -5, y: 15 },
                            { id: generateId(), x: -5, y: 45 }
                        ],
                        outputs: [
                            { id: generateId(), x: 85, y: 30 }
                        ],
                        state: false
                    };
                    break;
                case 'OR':
                    element = {
                        id: generateId(),
                        type: 'OR',
                        x, y,
                        width: 80,
                        height: 60,
                        inputs: [
                            { id: generateId(), x: -5, y: 15 },
                            { id: generateId(), x: -5, y: 45 }
                        ],
                        outputs: [
                            { id: generateId(), x: 85, y: 30 }
                        ],
                        state: false
                    };
                    break;
                case 'NOT':
                    element = {
                        id: generateId(),
                        type: 'NOT',
                        x, y,
                        width: 80,
                        height: 60,
                        inputs: [
                            { id: generateId(), x: -5, y: 30 }
                        ],
                        outputs: [
                            { id: generateId(), x: 85, y: 30 }
                        ],
                        state: false
                    };
                    break;
                case 'INPUT':
                    element = {
                        id: generateId(),
                        type: 'INPUT',
                        x, y,
                        width: 60,
                        height: 60,
                        inputs: [],
                        outputs: [
                            { id: generateId(), x: 65, y: 30 }
                        ],
                        state: false
                    };
                    break;
                case 'OUTPUT':
                    element = {
                        id: generateId(),
                        type: 'OUTPUT',
                        x, y,
                        width: 60,
                        height: 60,
                        inputs: [
                            { id: generateId(), x: -5, y: 30 }
                        ],
                        outputs: [],
                        state: false
                    };
                    break;
            }
            
            elements.push(element);
            saveState();
            render();
        }
        
        // 生成唯一ID
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }
        
        // 处理鼠标按下事件
        function handleMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 检查是否点击了端口
            for (const element of elements) {
                for (const input of element.inputs) {
                    const portX = element.x + input.x;
                    const portY = element.y + input.y;
                    if (distance(mouseX, mouseY, portX, portY) < 10) {
                        isDrawingWire = true;
                        wireStart = { elementId: element.id, portId: input.id, x: portX, y: portY, isInput: true };
                        document.getElementById('status-bar').textContent = '正在绘制导线...';
                        return;
                    }
                }
                for (const output of element.outputs) {
                    const portX = element.x + output.x;
                    const portY = element.y + output.y;
                    if (distance(mouseX, mouseY, portX, portY) < 10) {
                        isDrawingWire = true;
                        wireStart = { elementId: element.id, portId: output.id, x: portX, y: portY, isInput: false };
                        document.getElementById('status-bar').textContent = '正在绘制导线...';
                        return;
                    }
                }
            }
            
            // 检查是否点击了元件
            for (const element of elements) {
                if (mouseX >= element.x && mouseX <= element.x + element.width &&
                    mouseY >= element.y && mouseY <= element.y + element.height) {
                    if (currentTool === 'input-toggle' && element.type === 'INPUT') {
                        // 输入切换工具：切换输入状态
                        element.state = !element.state;
                        saveState();
                        calculateCircuit();
                        document.getElementById('status-bar').textContent = `输入状态已切换为: ${element.state ? '1' : '0'}`;
                        render();
                        return;
                    } else if (currentTool === 'delete') {
                        // 删除工具：删除元件
                        // 删除连接到该元件的所有导线
                        wires = wires.filter(wire => 
                            wire.start.elementId !== element.id && 
                            wire.end.elementId !== element.id
                        );
                        // 删除元件
                        elements = elements.filter(el => el.id !== element.id);
                        selectedElement = null;
                        saveState();
                        calculateCircuit();
                        document.getElementById('status-bar').textContent = '元件已删除';
                        render();
                        return;
                    } else {
                        // 选择工具：选择并准备拖拽
                        selectedElement = element;
                        selectedWire = null;
                        dragOffset.x = mouseX - element.x;
                        dragOffset.y = mouseY - element.y;
                        isDragging = true;
                        document.getElementById('status-bar').textContent = `选中元件: ${element.type}`;
                        return;
                    }
                }
            }
            
            // 检查是否点击了导线
            for (const wire of wires) {
                if (isPointOnWire(mouseX, mouseY, wire)) {
                    if (currentTool === 'delete') {
                        // 删除工具：删除导线
                        wires = wires.filter(w => w.id !== wire.id);
                        selectedWire = null;
                        saveState();
                        calculateCircuit();
                        document.getElementById('status-bar').textContent = '导线已删除';
                        render();
                        return;
                    } else {
                        // 选择工具：选择导线
                        selectedWire = wire;
                        selectedElement = null;
                        document.getElementById('status-bar').textContent = '选中导线';
                        return;
                    }
                }
            }
            
            // 点击空白处
            selectedElement = null;
            selectedWire = null;
            document.getElementById('status-bar').textContent = '就绪';
        }
        
        // 处理鼠标移动事件
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            if (isDragging && selectedElement) {
                selectedElement.x = mouseX - dragOffset.x;
                selectedElement.y = mouseY - dragOffset.y;
                // 更新连接到该元件的导线
                for (const wire of wires) {
                    if (wire.start.elementId === selectedElement.id) {
                        const element = selectedElement;
                        const port = wire.start.isInput ? 
                            element.inputs.find(p => p.id === wire.start.portId) :
                            element.outputs.find(p => p.id === wire.start.portId);
                        if (port) {
                            wire.start.x = element.x + port.x;
                            wire.start.y = element.y + port.y;
                        }
                    }
                    if (wire.end.elementId === selectedElement.id) {
                        const element = selectedElement;
                        const port = wire.end.isInput ? 
                            element.inputs.find(p => p.id === wire.end.portId) :
                            element.outputs.find(p => p.id === wire.end.portId);
                        if (port) {
                            wire.end.x = element.x + port.x;
                            wire.end.y = element.y + port.y;
                        }
                    }
                }
                render();
            }
            
            if (isDrawingWire) {
                render();
                // 绘制临时导线
                ctx.beginPath();
                ctx.moveTo(wireStart.x, wireStart.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 处理鼠标释放事件
        function handleMouseUp(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            if (isDrawingWire) {
                // 检查是否点击了目标端口
                for (const element of elements) {
                    if (element.id === wireStart.elementId) continue;
                    
                    for (const input of element.inputs) {
                        const portX = element.x + input.x;
                        const portY = element.y + input.y;
                        if (distance(mouseX, mouseY, portX, portY) < 10) {
                            // 确保不会将输入端口连接到输入端口
                            if (!wireStart.isInput) {
                                const wire = {
                                    id: generateId(),
                                    start: wireStart,
                                    end: { elementId: element.id, portId: input.id, x: portX, y: portY, isInput: true }
                                };
                                wires.push(wire);
                                saveState();
                                calculateCircuit();
                            }
                            isDrawingWire = false;
                            wireStart = null;
                            document.getElementById('status-bar').textContent = '导线连接成功';
                            render();
                            return;
                        }
                    }
                    
                    for (const output of element.outputs) {
                        const portX = element.x + output.x;
                        const portY = element.y + output.y;
                        if (distance(mouseX, mouseY, portX, portY) < 10) {
                            // 确保不会将输出端口连接到输出端口
                            if (wireStart.isInput) {
                                const wire = {
                                    id: generateId(),
                                    start: wireStart,
                                    end: { elementId: element.id, portId: output.id, x: portX, y: portY, isInput: false }
                                };
                                wires.push(wire);
                                saveState();
                                calculateCircuit();
                            }
                            isDrawingWire = false;
                            wireStart = null;
                            document.getElementById('status-bar').textContent = '导线连接成功';
                            render();
                            return;
                        }
                    }
                }
                
                // 取消绘制导线
                isDrawingWire = false;
                wireStart = null;
                document.getElementById('status-bar').textContent = '取消绘制导线';
                render();
            }
            
            isDragging = false;
        }
        
        // 计算两点之间的距离
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }
        
        // 检查点是否在导线上
        function isPointOnWire(x, y, wire) {
            const threshold = 5;
            const dx = wire.end.x - wire.start.x;
            const dy = wire.end.y - wire.start.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            const t = ((x - wire.start.x) * dx + (y - wire.start.y) * dy) / (length * length);
            const closestX = wire.start.x + t * dx;
            const closestY = wire.start.y + t * dy;
            return distance(x, y, closestX, closestY) < threshold && t >= 0 && t <= 1;
        }
        

        
        // 切换网格显示
        function toggleGrid() {
            gridEnabled = !gridEnabled;
            const grid = document.getElementById('grid');
            grid.style.display = gridEnabled ? 'block' : 'none';
            document.getElementById('status-bar').textContent = gridEnabled ? '网格已启用' : '网格已禁用';
        }
        
        // 撤销操作
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const state = history[historyIndex];
                elements = JSON.parse(state.elements);
                wires = JSON.parse(state.wires);
                selectedElement = null;
                selectedWire = null;
                document.getElementById('status-bar').textContent = '已撤销';
                render();
            }
        }
        
        // 重做操作
        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const state = history[historyIndex];
                elements = JSON.parse(state.elements);
                wires = JSON.parse(state.wires);
                selectedElement = null;
                selectedWire = null;
                document.getElementById('status-bar').textContent = '已重做';
                render();
            }
        }
        
        // 保存状态到历史记录
        function saveState() {
            // 移除当前索引之后的历史记录
            history = history.slice(0, historyIndex + 1);
            // 添加新状态
            history.push({
                elements: JSON.stringify(elements),
                wires: JSON.stringify(wires)
            });
            // 限制历史记录长度
            if (history.length > 50) {
                history.shift();
            } else {
                historyIndex++;
            }
        }
        
        // 计算电路
        function calculateCircuit() {
            // 先计算输入元件
            for (const element of elements) {
                if (element.type === 'INPUT') {
                    // 输入元件状态保持不变
                }
            }
            
            // 计算逻辑门
            for (const element of elements) {
                if (element.type === 'AND') {
                    // 与门：所有输入为true时输出为true
                    let allTrue = true;
                    for (const input of element.inputs) {
                        // 查找连接到该输入的导线
                        const wiresToInput = wires.filter(wire => 
                            wire.end.elementId === element.id && 
                            wire.end.portId === input.id
                        );
                        
                        // 检查是否有任何输入为true
                        let inputTrue = false;
                        for (const wire of wiresToInput) {
                            const sourceElement = elements.find(e => e.id === wire.start.elementId);
                            if (sourceElement && sourceElement.state) {
                                inputTrue = true;
                                break;
                            }
                        }
                        
                        if (!inputTrue) {
                            allTrue = false;
                            break;
                        }
                    }
                    element.state = allTrue;
                } else if (element.type === 'OR') {
                    // 或门：任何输入为true时输出为true
                    let anyTrue = false;
                    for (const input of element.inputs) {
                        // 查找连接到该输入的导线
                        const wiresToInput = wires.filter(wire => 
                            wire.end.elementId === element.id && 
                            wire.end.portId === input.id
                        );
                        
                        // 检查是否有任何输入为true
                        for (const wire of wiresToInput) {
                            const sourceElement = elements.find(e => e.id === wire.start.elementId);
                            if (sourceElement && sourceElement.state) {
                                anyTrue = true;
                                break;
                            }
                        }
                        
                        if (anyTrue) {
                            break;
                        }
                    }
                    element.state = anyTrue;
                } else if (element.type === 'NOT') {
                    // 非门：输入为true时输出为false，反之亦然
                    let inputTrue = false;
                    for (const input of element.inputs) {
                        // 查找连接到该输入的导线
                        const wiresToInput = wires.filter(wire => 
                            wire.end.elementId === element.id && 
                            wire.end.portId === input.id
                        );
                        
                        // 检查是否有任何输入为true
                        for (const wire of wiresToInput) {
                            const sourceElement = elements.find(e => e.id === wire.start.elementId);
                            if (sourceElement && sourceElement.state) {
                                inputTrue = true;
                                break;
                            }
                        }
                        
                        if (inputTrue) {
                            break;
                        }
                    }
                    element.state = !inputTrue;
                } else if (element.type === 'OUTPUT') {
                    // 输出元件：显示输入状态
                    let inputTrue = false;
                    for (const input of element.inputs) {
                        // 查找连接到该输入的导线
                        const wiresToInput = wires.filter(wire => 
                            wire.end.elementId === element.id && 
                            wire.end.portId === input.id
                        );
                        
                        // 检查是否有任何输入为true
                        for (const wire of wiresToInput) {
                            const sourceElement = elements.find(e => e.id === wire.start.elementId);
                            if (sourceElement && sourceElement.state) {
                                inputTrue = true;
                                break;
                            }
                        }
                        
                        if (inputTrue) {
                            break;
                        }
                    }
                    element.state = inputTrue;
                }
            }
            
            render();
        }
        
        // 渲染函数
        function render() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制导线
            for (const wire of wires) {
                ctx.beginPath();
                ctx.moveTo(wire.start.x, wire.start.y);
                ctx.lineTo(wire.end.x, wire.end.y);
                ctx.strokeStyle = wire === selectedWire ? '#ff00ff' : '#00ffff';
                ctx.lineWidth = wire === selectedWire ? 3 : 2;
                ctx.stroke();
            }
            
            // 绘制元件
            for (const element of elements) {
                // 绘制元件背景
                ctx.fillStyle = element === selectedElement ? 'rgba(0, 255, 255, 0.3)' : 'rgba(0, 255, 255, 0.1)';
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.rect(element.x, element.y, element.width, element.height);
                ctx.fill();
                ctx.stroke();
                
                // 绘制元件符号
                ctx.fillStyle = '#00ffff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                switch (element.type) {
                    case 'AND':
                        // 绘制与门符号
                        ctx.beginPath();
                        ctx.moveTo(element.x + 20, element.y + 10);
                        ctx.lineTo(element.x + 20, element.y + 50);
                        ctx.arc(element.x + 60, element.y + 30, 20, Math.PI * 1.5, Math.PI * 0.5);
                        ctx.closePath();
                        ctx.stroke();
                        break;
                    case 'OR':
                        // 绘制或门符号
                        ctx.beginPath();
                        ctx.moveTo(element.x + 20, element.y + 10);
                        ctx.lineTo(element.x + 20, element.y + 50);
                        ctx.arc(element.x + 60, element.y + 30, 20, Math.PI * 1.5, Math.PI * 0.5);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(element.x + 20, element.y + 30, 10, Math.PI * 0.5, Math.PI * 1.5);
                        ctx.stroke();
                        break;
                    case 'NOT':
                        // 绘制非门符号
                        ctx.beginPath();
                        ctx.moveTo(element.x + 20, element.y + 10);
                        ctx.lineTo(element.x + 20, element.y + 50);
                        ctx.arc(element.x + 50, element.y + 30, 10, Math.PI * 1.5, Math.PI * 0.5);
                        ctx.lineTo(element.x + 70, element.y + 30);
                        ctx.arc(element.x + 75, element.y + 30, 5, 0, Math.PI * 2);
                        ctx.stroke();
                        break;
                    case 'INPUT':
                        // 绘制输入块
                        ctx.fillText(element.state ? '1' : '0', element.x + element.width / 2, element.y + element.height / 2);
                        break;
                    case 'OUTPUT':
                        // 绘制输出块
                        ctx.fillText(element.state ? '1' : '0', element.x + element.width / 2, element.y + element.height / 2);
                        break;
                }
                
                // 绘制端口
                for (const input of element.inputs) {
                    const portX = element.x + input.x;
                    const portY = element.y + input.y;
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(portX, portY, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                for (const output of element.outputs) {
                    const portX = element.x + output.x;
                    const portY = element.y + output.y;
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(portX, portY, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // 初始化应用
        init();
    </script>
</body>
</html>
